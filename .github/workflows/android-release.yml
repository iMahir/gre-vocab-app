name: Android Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Patch legacy Android support dependencies
        run: |
          VOICE_GRADLE="node_modules/@react-native-voice/voice/android/build.gradle"
          if [ -f "$VOICE_GRADLE" ]; then
            sed -i 's|implementation "com.android.support:appcompat-v7:${supportVersion}"|implementation "androidx.appcompat:appcompat:1.7.0"|' "$VOICE_GRADLE"
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Generate Android native project (if missing)
        run: |
          set -euo pipefail
          if [ ! -d android ]; then
            RN_VERSION=$(node -e "const pkg = require('./package.json'); const version = (pkg.dependencies && pkg.dependencies['react-native']) || (pkg.devDependencies && pkg.devDependencies['react-native']); if (!version) { console.error('react-native dependency missing in package.json'); process.exit(1); } const match = String(version).match(/\\d+\\.\\d+\\.\\d+/); if (!match) { console.error('Unable to parse react-native version: ' + version); process.exit(1); } console.log(match[0]);")
            APP_NAME=$(node -e "try { const app = require('./app.json'); console.log(app.name || 'AndroidBuildApp'); } catch (_) { console.log('AndroidBuildApp'); }")
            PACKAGE_SUFFIX=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9')
            if [ -z "$PACKAGE_SUFFIX" ]; then
              PACKAGE_SUFFIX=androidbuildapp
            elif [[ "$PACKAGE_SUFFIX" =~ ^[0-9] ]]; then
              PACKAGE_SUFFIX="app$PACKAGE_SUFFIX"
            fi
            PACKAGE_NAME="com.$PACKAGE_SUFFIX"
            TMP_NATIVE_DIR=$(mktemp -d)
            trap 'rm -rf "$TMP_NATIVE_DIR"' EXIT
            if ! npx @react-native-community/cli init "$APP_NAME" \
              --version "$RN_VERSION" \
              --directory "$TMP_NATIVE_DIR" \
              --package-name "$PACKAGE_NAME" \
              --skip-install \
              --skip-git-init; then
              echo "Failed to generate Android native project for release build (rn=$RN_VERSION package=$PACKAGE_NAME)."
              exit 1
            fi
            cp -R "$TMP_NATIVE_DIR/android" ./android
          fi

      - name: Increase Gradle JVM memory
        run: |
          if grep -q '^org.gradle.jvmargs=' android/gradle.properties; then
            sed -i 's|^org.gradle.jvmargs=.*|org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8|' android/gradle.properties
          else
            echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8" >> android/gradle.properties
          fi

      - name: Build APK
        run: |
          test -f android/gradlew
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Prepare release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=manual-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=pr-${{ github.event.pull_request.number }}-merge-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release and upload APK
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.value }}
          name: GRE Vocab Android ${{ steps.tag.outputs.value }}
          artifacts: |
            android/app/build/outputs/apk/release/*-release.apk
            android/app/build/outputs/apk/release/*-release-unsigned.apk
          artifactContentType: application/vnd.android.package-archive
          generateReleaseNotes: true
          allowUpdates: true
          makeLatest: true
