name: Android Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    env:
      ANDROIDX_APPCOMPAT_VERSION: '1.7.0'
      RELEASE_ANDROID_APP_NAME: 'main'
      RELEASE_ANDROID_PACKAGE_NAME: 'com.imahir.grevocabapp'
      RELEASE_ANDROID_APP_LABEL: 'GRE Vocab Flash Cards'
      RELEASE_ANDROID_ICON: 'assets/icon.png'
      RELEASE_ANDROID_ADAPTIVE_ICON: 'assets/adaptive-icon.png'
      RELEASE_ANDROID_ADAPTIVE_BG: '#050505'
      RELEASE_APK_FILENAME: 'app-release.apk'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Patch legacy Android support dependencies
        run: |
          VOICE_GRADLE="node_modules/@react-native-voice/voice/android/build.gradle"
          if [ ! -f "$VOICE_GRADLE" ]; then
            echo "Expected file not found: $VOICE_GRADLE"
            exit 1
          fi
          # Replace legacy appcompat declaration (supports variable/hardcoded versions and quote styles).
          python - "$VOICE_GRADLE" <<'PY'
          import os
          import pathlib
          import re
          import sys

          gradle_file = pathlib.Path(sys.argv[1])
          contents = gradle_file.read_text()
          legacy_pattern = re.compile(r'implementation\s+[\'"]com\.android\.support:appcompat-v7:[^\'"]+[\'"]')
          if not legacy_pattern.search(contents):
              print(f"No legacy appcompat dependency found in {gradle_file}")
              sys.exit(1)
          patched = legacy_pattern.sub(
              f'implementation "androidx.appcompat:appcompat:{os.environ["ANDROIDX_APPCOMPAT_VERSION"]}"',
              contents,
          )
          gradle_file.write_text(patched)
          PY
          if grep -q 'com.android.support:appcompat-v7' "$VOICE_GRADLE"; then
            echo "Failed to patch legacy appcompat dependency in $VOICE_GRADLE"
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Generate Android native project (if missing)
        run: |
          set -euo pipefail
          if [ ! -d android ]; then
            RN_VERSION=$(node -e "const pkg = require('./package.json'); const version = (pkg.dependencies && pkg.dependencies['react-native']) || (pkg.devDependencies && pkg.devDependencies['react-native']); if (!version) { console.error('react-native dependency missing in package.json'); process.exit(1); } const match = String(version).match(/\\d+\\.\\d+\\.\\d+/); if (!match) { console.error('Unable to parse react-native version: ' + version); process.exit(1); } console.log(match[0]);")
            TMP_NATIVE_DIR=$(mktemp -d)
            trap 'rm -rf "$TMP_NATIVE_DIR"' EXIT
            if ! npx @react-native-community/cli init "$RELEASE_ANDROID_APP_NAME" \
              --version "$RN_VERSION" \
              --directory "$TMP_NATIVE_DIR" \
              --package-name "$RELEASE_ANDROID_PACKAGE_NAME" \
              --skip-install \
              --skip-git-init; then
              echo "Failed to generate Android native project for release build (rn=$RN_VERSION package=$RELEASE_ANDROID_PACKAGE_NAME)."
              exit 1
            fi
            cp -R "$TMP_NATIVE_DIR/android" ./android
          fi

      - name: Apply stable Android release branding
        run: |
          set -euo pipefail
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          APP_BUILD_FILE="android/app/build.gradle"
          ADAPTIVE_DIR="android/app/src/main/res/mipmap-anydpi-v26"

          python - "$STRINGS_FILE" "$APP_BUILD_FILE" "$RELEASE_ANDROID_APP_LABEL" "$RELEASE_ANDROID_PACKAGE_NAME" <<'PYTHON'
          import pathlib
          import re
          import sys

          strings_file = pathlib.Path(sys.argv[1])
          build_file = pathlib.Path(sys.argv[2])
          label = sys.argv[3]
          package_name = sys.argv[4]

          if not strings_file.exists():
            raise SystemExit(f"Missing file: {strings_file}")
          strings = strings_file.read_text()
          if 'name="app_name"' not in strings:
            raise SystemExit('app_name string missing in strings.xml')
          app_name_pattern = re.compile(r'(<string\s+name="app_name">)[^<]*(</string>)')
          if not app_name_pattern.search(strings):
            raise SystemExit('Unable to locate app_name string tag in strings.xml')
          strings = app_name_pattern.sub(lambda m: f'{m.group(1)}{label}{m.group(2)}', strings, count=1)
          strings_file.write_text(strings)

          if not build_file.exists():
            raise SystemExit(f"Missing file: {build_file}")
          build_gradle = build_file.read_text()
          if 'applicationId' not in build_gradle:
            raise SystemExit('applicationId not found in android/app/build.gradle')
          package_pattern = re.compile(r'^[a-zA-Z][a-zA-Z0-9_]*(\.[a-zA-Z][a-zA-Z0-9_]*)+$')
          if not package_pattern.fullmatch(package_name):
            raise SystemExit(f'Invalid Android package name: {package_name}')
          build_gradle = re.sub(
            r'applicationId\s+"[^"]+"',
            lambda _: f'applicationId "{package_name}"',
            build_gradle,
            count=1,
          )
          build_file.write_text(build_gradle)
          PYTHON

          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp "$RELEASE_ANDROID_ICON" "android/app/src/main/res/mipmap-$density/ic_launcher.png"
            cp "$RELEASE_ANDROID_ICON" "android/app/src/main/res/mipmap-$density/ic_launcher_round.png"
          done

          rm -f android/app/src/main/res/drawable/ic_launcher_foreground.xml
          cp "$RELEASE_ANDROID_ADAPTIVE_ICON" android/app/src/main/res/drawable/ic_launcher_foreground.png
          cat > android/app/src/main/res/drawable/ic_launcher_background.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <solid android:color="${RELEASE_ANDROID_ADAPTIVE_BG}" />
          </shape>
          EOF
          mkdir -p "$ADAPTIVE_DIR"
          cat > "$ADAPTIVE_DIR/ic_launcher.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background" />
            <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>
          EOF
          cat > "$ADAPTIVE_DIR/ic_launcher_round.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background" />
            <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>
          EOF

      - name: Increase Gradle JVM memory
        run: |
          if grep -q '^org.gradle.jvmargs=' android/gradle.properties; then
            sed -i 's|^org.gradle.jvmargs=.*|org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8|' android/gradle.properties
          else
            echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8" >> android/gradle.properties
          fi

      - name: Build APK
        run: |
          test -f android/gradlew
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Verify Android release identity and package artifact
        run: |
          set -euo pipefail
          grep -Eq "applicationId\\s+\"$RELEASE_ANDROID_PACKAGE_NAME\"" android/app/build.gradle
          grep -Fq "<string name=\"app_name\">$RELEASE_ANDROID_APP_LABEL</string>" android/app/src/main/res/values/strings.xml
          test -f android/app/src/main/res/drawable/ic_launcher_foreground.png
          test -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml

          mkdir -p release-artifacts
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk "release-artifacts/$RELEASE_APK_FILENAME"
          elif [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk "release-artifacts/$RELEASE_APK_FILENAME"
          else
            echo "No release APK found in android/app/build/outputs/apk/release"
            exit 1
          fi

      - name: Prepare release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=manual-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=pr-${{ github.event.pull_request.number }}-merge-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release and upload APK
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.value }}
          name: GRE Vocab Android ${{ steps.tag.outputs.value }}
          artifacts: release-artifacts/app-release.apk
          artifactContentType: application/vnd.android.package-archive
          generateReleaseNotes: true
          allowUpdates: true
          makeLatest: true
