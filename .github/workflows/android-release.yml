name: Android Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        env:
          EXPO_PROJECT_ID: ${{ env.EXPO_PROJECT_ID }}
        run: npx expo prebuild --platform android --non-interactive

      # Must be AFTER "expo prebuild" so Gradle files exist (gradlew, gradle-wrapper.properties, *.gradle, etc.)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Increase Gradle JVM memory
        run: |
          if grep -q '^org.gradle.jvmargs=' android/gradle.properties; then
            sed -i 's|^org.gradle.jvmargs=.*|org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8|' android/gradle.properties
          else
            echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8" >> android/gradle.properties
          fi

      - name: Build APK
        run: |
          test -f android/gradlew
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Prepare release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=manual-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=pr-${{ github.event.pull_request.number }}-merge-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish OTA update
        if: ${{ env.EXPO_TOKEN != '' && env.EXPO_PROJECT_ID != '' }}
        env:
          EXPO_TOKEN: ${{ env.EXPO_TOKEN }}
          EXPO_PROJECT_ID: ${{ env.EXPO_PROJECT_ID }}
        run: npx eas-cli@latest update --branch production --platform android --message "Android release ${{ steps.tag.outputs.value }}" --non-interactive

      - name: Warn when OTA publish is skipped
        if: ${{ env.EXPO_TOKEN == '' || env.EXPO_PROJECT_ID == '' }}
        run: echo "::warning::Skipping OTA publish. Configure EXPO_TOKEN and EXPO_PROJECT_ID repository secrets to enable auto updates."

      - name: Create GitHub release and upload APK
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.value }}
          name: GRE Vocab Android ${{ steps.tag.outputs.value }}
          artifacts: |
            android/app/build/outputs/apk/release/*-release.apk
            android/app/build/outputs/apk/release/*-release-unsigned.apk
          artifactContentType: application/vnd.android.package-archive
          generateReleaseNotes: true
          allowUpdates: true
          makeLatest: true
